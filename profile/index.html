<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Solo Study</title>
    <link rel="preconnect" href__="https://fonts.googleapis.com">
    <link href__="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
            background: #f9fafb;
        }

        /* ── NAVBAR ── */
        .home-nav {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 14px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 0, 0, 0.07);
            box-shadow: 0 2px 24px rgba(0, 0, 0, 0.06);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            cursor: default;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: #374151;
            font-weight: 500;
            transition: all 0.2s ease;
            font-size: 15px;
            padding: 8px 14px;
            border-radius: 8px;
        }

        .nav-links a:hover {
            color: #22c55e;
            background: rgba(34, 197, 94, 0.08);
        }

        .nav-links a.active {
            color: #22c55e;
            background: rgba(34, 197, 94, 0.08);
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .nav-btn {
            color: white;
            padding: 9px 20px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            box-shadow: 0 4px 14px rgba(34, 197, 94, 0.3);
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
        }

        .nav-sign-in {
            background: transparent;
            color: #374151;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 9px 18px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
        }

        .nav-sign-in:hover {
            border-color: #22c55e;
            color: #22c55e;
            background: rgba(34, 197, 94, 0.05);
        }

        .logout-btn {
            background: linear-gradient(135deg, #ef4444, #dc2626) !important;
            box-shadow: 0 4px 14px rgba(239, 68, 68, 0.3) !important;
        }

        .logout-btn:hover {
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.45) !important;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 6px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .hamburger:hover { background: rgba(0, 0, 0, 0.05); }

        .hamburger span {
            display: block;
            width: 22px;
            height: 2.5px;
            background: #1e293b;
            border-radius: 3px;
            transition: 0.3s;
        }

        /* ── PROFILE PAGE ── */
        .profile-page {
            min-height: 90vh;
            padding: 70px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile-page h2 {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 40px;
            color: #111827;
            letter-spacing: -0.8px;
        }

        .profile-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03), 0 10px 40px rgba(0,0,0,0.08);
            padding: 50px 60px;
            text-align: center;
            width: 100%;
            max-width: 500px;
            border: 1px solid #f1f5f9;
            position: relative;
            overflow: hidden;
        }

        .profile-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, #22c55e, #00bcd4);
        }

        .profile-avatar {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 800;
            color: white;
            margin: 0 auto 20px auto;
            box-shadow: 0 8px 24px rgba(34, 197, 94, 0.4);
        }

        .profile-username {
            font-size: 26px;
            font-weight: 800;
            color: #111827;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .profile-label {
            color: #6b7280;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 35px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(34, 197, 94, 0.08);
            color: #16a34a;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 10px;
        }

        .stat-box {
            background: #f9fafb;
            border-radius: 14px;
            padding: 22px 16px;
            transition: all 0.3s ease;
            border: 1px solid #f1f5f9;
            cursor: default;
        }

        .stat-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 32px rgba(34, 197, 94, 0.12);
            border-color: rgba(34, 197, 94, 0.2);
            background: white;
        }

        .stat-icon {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 26px;
            font-weight: 800;
            color: #111827;
            letter-spacing: -0.5px;
        }

        .stat-label {
            font-size: 12px;
            color: #6b7280;
            margin-top: 5px;
            font-weight: 500;
        }

        /* ── NOT LOGGED IN ── */
        .not-logged-in {
            text-align: center;
            padding: 80px 40px;
            animation: fadeIn 0.5s ease;
        }

        .not-logged-in h2 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 14px;
            color: #111827;
            letter-spacing: -0.5px;
        }

        .not-logged-in p {
            color: #6b7280;
            margin-bottom: 32px;
            font-size: 16px;
            line-height: 1.6;
        }

        .hero-btn {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            padding: 13px 34px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 8px 24px rgba(34, 197, 94, 0.38);
            font-family: 'Inter', sans-serif;
        }

        .hero-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 36px rgba(34, 197, 94, 0.48);
        }

        /* ── ANIMATIONS ── */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .profile-card {
            animation: fadeIn 0.5s ease forwards;
        }

        /* ── MOBILE ── */
        @media (max-width: 768px) {
            .home-nav {
                padding: 14px 20px;
                position: relative;
            }

            .logo { font-size: 20px; }

            .hamburger { display: flex; }

            .nav-buttons { display: none; }

            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 62px;
                left: 0; right: 0;
                background: rgba(255, 255, 255, 0.98);
                backdrop-filter: blur(16px);
                padding: 16px;
                gap: 6px;
                border-bottom: 1px solid #f1f5f9;
                z-index: 999;
                box-shadow: 0 12px 32px rgba(0,0,0,0.1);
            }

            .nav-links.open { display: flex; }

            .nav-links a {
                padding: 10px 14px;
                width: 100%;
                border-radius: 10px;
            }

            .profile-page {
                padding: 50px 20px;
            }

            .profile-page h2 {
                font-size: 28px;
                margin-bottom: 28px;
            }

            .profile-card {
                padding: 36px 28px;
            }

            .profile-username {
                font-size: 22px;
            }

            .stat-value {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="home-nav">
    <h1 class="logo">Solo Study</h1>
    <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
    </button>
    <div class="nav-right">
        <ul class="nav-links" id="navLinks">
            <li><a href="../index.html">Home</a></li>
            <li><a href="../streak/index.html">Streak</a></li>
            <li><a href="../lessons/index.html">Lessons</a></li>
            <li><a href="../contact/index.html">Contact</a></li>
            <li><a href="index.html" class="active" id="profileLink" style="display:none">Profile</a></li>
        </ul>
        <div class="nav-buttons" id="navButtons">
            <button class="nav-btn" id="getStartedBtn">Get Started</button>
            <button class="nav-sign-in" id="signInBtn" onclick="window.location.href__='/login/index.html'">Sign in</button>
            <button class="nav-btn logout-btn" id="logoutBtn" style="display:none">Logout</button>
        </div>
    </div>
</nav>

<!-- PROFILE CONTENT -->
<div class="profile-page" id="profileContent"></div>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="../firebase-config.js"></script>
<script>
    // ── AUTH ──
    const loggedIn = localStorage.getItem("loggedIn") === "true";
    const user = JSON.parse(localStorage.getItem("loggedInUser") || "null");
    const container = document.getElementById("profileContent");

    if (!loggedIn || !user) {
        container.innerHTML = `
            <div class="not-logged-in">
                <h2>You're not logged in 👋</h2>
                <p>Sign in to view your profile and track your progress.</p>
                <a href__="/login/index.html" class="hero-btn">Sign In</a>
            </div>`;
    } else {
        const xp = parseInt(localStorage.getItem("xp") || "0");
        const level = Math.floor(xp / 100) + 1;
        const xpIntoLevel = xp % 100;

        const streakData = JSON.parse(localStorage.getItem("streakData") || '{"count":0}');
        const streak = streakData.count || 0;

        const lessonKeys = ["place-value", "multiplication-fractions", "division-fractions", "fractions"];
        let completedLessons = 0;
        for (const key of lessonKeys) {
            const data = JSON.parse(localStorage.getItem("lesson-" + key) || "null");
            if (data && data.exercises > 0 && data.completed >= data.exercises) {
                completedLessons++;
            }
        }

        const initial = user.username ? user.username[0].toUpperCase() : "?";

        container.innerHTML = `
            <h2>My Profile</h2>
            <div class="profile-card">
                <div class="profile-avatar">${initial}</div>
                <div class="profile-username">${user.username}</div>
                <div class="profile-label">⚡ Solo Study Member</div>

                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-icon">⭐</div>
                        <div class="stat-value">${xp}</div>
                        <div class="stat-label">Total XP</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-icon">🏅</div>
                        <div class="stat-value">Level ${level}</div>
                        <div class="stat-label">${xpIntoLevel}/100 XP to next</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-icon">🔥</div>
                        <div class="stat-value">${streak}</div>
                        <div class="stat-label">Day Streak</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-icon">📚</div>
                        <div class="stat-value">${completedLessons}</div>
                        <div class="stat-label">Lessons Completed</div>
                    </div>
                </div>
            </div>`;
    }

    // ── NAVBAR ──
    const logoutBtn = document.getElementById("logoutBtn");
    const getStartedBtn = document.getElementById("getStartedBtn");
    const signInBtn = document.getElementById("signInBtn");
    const profileLink = document.getElementById("profileLink");

    if (loggedIn) {
        if (logoutBtn)     logoutBtn.style.display    = "inline-block";
        if (getStartedBtn) getStartedBtn.style.display = "none";
        if (signInBtn)     signInBtn.style.display     = "none";
        if (profileLink)   profileLink.style.display   = "inline";
    }

    logoutBtn?.addEventListener("click", () => {
        localStorage.removeItem("loggedIn");
        localStorage.removeItem("loggedInUser");
        window.location.href = "/index.html";
    });

    // ── HAMBURGER ──
    document.getElementById("hamburger")?.addEventListener("click", () => {
        document.getElementById("navLinks").classList.toggle("open");
    });
</script>

</body>
</html>
