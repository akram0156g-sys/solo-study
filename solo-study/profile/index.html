<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Solo Study</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .profile-page {
            min-height: 90vh;
            background: #f9fafb;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile-page h2 {
            font-size: 36px;
            margin-bottom: 40px;
            color: #111827;
        }

        .profile-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            padding: 50px 60px;
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        .profile-avatar {
            width: 90px;
            height: 90px;
            background: #22c55e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            color: white;
            margin: 0 auto 20px auto;
        }

        .profile-username {
            font-size: 26px;
            font-weight: bold;
            color: #111827;
            margin-bottom: 8px;
        }

        .profile-label {
            color: #6b7280;
            font-size: 15px;
            margin-bottom: 35px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 10px;
        }

        .stat-box {
            background: #f9fafb;
            border-radius: 12px;
            padding: 20px;
            transition: 0.3s ease;
        }

        .stat-box:hover {
            transform: translateY(-4px);
        }

        .stat-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #111827;
        }

        .stat-label {
            font-size: 13px;
            color: #6b7280;
            margin-top: 4px;
        }

        .not-logged-in {
            text-align: center;
            padding: 80px 40px;
        }

        .not-logged-in h2 {
            font-size: 28px;
            margin-bottom: 15px;
            color: #111827;
        }

        .not-logged-in p {
            color: #6b7280;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="home-nav">
    <h1 class="logo">Solo Study</h1>
    <div class="nav-right">
        <ul class="nav-links">
            <li><a href="/index.html">Home</a></li>
            <li><a href="#">Streak</a></li>
            <li><a href="/lessons/index.html">Lessons</a></li>
            <li><a href="/contact/index.html">Contact</a></li>
            <li><a href="/profile/index.html" id="profileLink" style="display:none">Profile</a></li>
        </ul>
        <div class="nav-buttons">
            <button class="nav-btn">Get Started</button>
            <button class="nav-sign-in">Sign in</button>
            <button class="nav-btn logout-btn" id="logoutBtn" style="display:none; background:#ef4444;">Logout</button>
        </div>
    </div>
</nav>

<!-- PROFILE CONTENT -->
<div class="profile-page" id="profileContent">
    <!-- filled by JS -->
</div>

<script>
    const loggedIn = localStorage.getItem("loggedIn") === "true";
    const user = JSON.parse(localStorage.getItem("loggedInUser") || "null");
    const container = document.getElementById("profileContent");

    if (!loggedIn || !user) {
        container.innerHTML = `
            <div class="not-logged-in">
                <h2>You're not logged in</h2>
                <p>Sign in to view your profile and track your progress.</p>
                <a href="/login/index.html" class="hero-btn">Sign In</a>
            </div>`;
    } else {
        const xp = parseInt(localStorage.getItem("xp") || "0");
        const level = Math.floor(xp / 100) + 1;
        const xpIntoLevel = xp % 100;

        const streakData = JSON.parse(localStorage.getItem("streakData") || '{"count":0}');
        const streak = streakData.count || 0;

        // Count completed lessons (100%)
        const lessonKeys = ["place-value", "multiplication-fractions", "division-fractions", "fractions"];
        let completedLessons = 0;
        for (const key of lessonKeys) {
            const data = JSON.parse(localStorage.getItem("lesson-" + key) || "null");
            if (data && data.exercises > 0 && data.completed >= data.exercises) {
                completedLessons++;
            }
        }

        const initial = user.username ? user.username[0].toUpperCase() : "?";

        container.innerHTML = `
            <h2>My Profile</h2>
            <div class="profile-card">
                <div class="profile-avatar">${initial}</div>
                <div class="profile-username">${user.username}</div>
                <div class="profile-label">Solo Study Member</div>

                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-icon">⭐</div>
                        <div class="stat-value">${xp}</div>
                        <div class="stat-label">Total XP</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-icon">🏅</div>
                        <div class="stat-value">Level ${level}</div>
                        <div class="stat-label">${xpIntoLevel}/100 XP to next</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-icon">🔥</div>
                        <div class="stat-value">${streak}</div>
                        <div class="stat-label">Day Streak</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-icon">📚</div>
                        <div class="stat-value">${completedLessons}</div>
                        <div class="stat-label">Lessons Completed</div>
                    </div>
                </div>
            </div>`;
    }

    // Navbar logic
    function updateNavButtons() {
        const logoutBtn = document.getElementById("logoutBtn");
        const getStartedBtn = document.querySelector(".nav-btn:not(.logout-btn)");
        const signInBtn = document.querySelector(".nav-sign-in");
        const profileLink = document.getElementById("profileLink");

        if (loggedIn) {
            if (logoutBtn) logoutBtn.style.display = "inline-block";
            if (getStartedBtn) getStartedBtn.style.display = "none";
            if (signInBtn) signInBtn.style.display = "none";
            if (profileLink) profileLink.style.display = "inline";
        }
    }

    document.getElementById("logoutBtn")?.addEventListener("click", function () {
        localStorage.removeItem("loggedIn");
        localStorage.removeItem("loggedInUser");
        window.location.href = "/index.html";
    });

    updateNavButtons();
</script>

</body>
</html>
