<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streak - Solo Study</title>
    <link rel="preconnect" href__="https://fonts.googleapis.com">
    <link href__="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            background: #f9fafb;
        }

        /* ── NAVBAR ── */
        .home-nav {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 14px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(0,0,0,0.07);
            box-shadow: 0 2px 24px rgba(0,0,0,0.06);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            cursor: default;
        }

        .nav-right { display: flex; align-items: center; gap: 12px; }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: #374151;
            font-weight: 500;
            font-size: 15px;
            padding: 8px 14px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #22c55e;
            background: rgba(34,197,94,0.08);
        }

        .nav-buttons { display: flex; gap: 10px; align-items: center; }

        .nav-btn {
            color: white;
            padding: 9px 20px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            box-shadow: 0 4px 14px rgba(34,197,94,0.3);
            transition: all 0.3s ease;
        }

        .nav-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(34,197,94,0.4); }

        .nav-sign-in {
            background: transparent;
            color: #374151;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            font-weight: 500;
            cursor: pointer;
            padding: 9px 18px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
        }

        .nav-sign-in:hover { border-color: #22c55e; color: #22c55e; background: rgba(34,197,94,0.05); }

        .logout-btn {
            background: linear-gradient(135deg, #ef4444, #dc2626) !important;
            box-shadow: 0 4px 14px rgba(239,68,68,0.3) !important;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 6px;
            border-radius: 8px;
        }

        .hamburger span {
            display: block;
            width: 22px;
            height: 2.5px;
            background: #1e293b;
            border-radius: 3px;
            transition: 0.3s;
        }

        /* ── PAGE ── */
        .streak-page {
            min-height: 90vh;
            padding: 70px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .streak-page h2 {
            font-size: 36px;
            font-weight: 800;
            color: #111827;
            margin-bottom: 10px;
            letter-spacing: -0.8px;
        }

        .streak-page .subtitle {
            color: #6b7280;
            font-size: 16px;
            margin-bottom: 40px;
        }

        /* ── MAIN STREAK CARD ── */
        .streak-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03), 0 10px 40px rgba(0,0,0,0.08);
            padding: 50px 60px;
            text-align: center;
            width: 100%;
            max-width: 500px;
            border: 1px solid #f1f5f9;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.5s ease forwards;
            margin-bottom: 28px;
        }

        .streak-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, #f97316, #ef4444);
        }

        .streak-flame {
            font-size: 72px;
            margin-bottom: 10px;
            display: block;
            animation: flamePulse 1.5s ease-in-out infinite;
        }

        @keyframes flamePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .streak-count {
            font-size: 72px;
            font-weight: 900;
            color: #111827;
            letter-spacing: -3px;
            line-height: 1;
            margin-bottom: 6px;
        }

        .streak-count span {
            background: linear-gradient(135deg, #f97316, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .streak-label {
            font-size: 18px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }

        .streak-sublabel {
            font-size: 13px;
            color: #9ca3af;
            margin-bottom: 30px;
        }

        .streak-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
        }

        .streak-status.active {
            background: rgba(34,197,94,0.1);
            color: #16a34a;
        }

        .streak-status.warning {
            background: rgba(249,115,22,0.1);
            color: #ea580c;
        }

        .streak-status.inactive {
            background: rgba(107,114,128,0.1);
            color: #6b7280;
        }

        /* ── STATS ROW ── */
        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 28px;
            animation: fadeIn 0.6s ease forwards;
        }

        .stat-box {
            background: white;
            border-radius: 16px;
            padding: 22px 16px;
            text-align: center;
            border: 1px solid #f1f5f9;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            cursor: default;
        }

        .stat-box:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(34,197,94,0.12);
            border-color: rgba(34,197,94,0.2);
        }

        .stat-icon { font-size: 26px; margin-bottom: 8px; }
        .stat-value { font-size: 22px; font-weight: 800; color: #111827; letter-spacing: -0.5px; }
        .stat-label { font-size: 11px; color: #9ca3af; margin-top: 4px; font-weight: 500; }

        /* ── WEEKLY CALENDAR ── */
        .week-card {
            background: white;
            border-radius: 20px;
            padding: 30px 40px;
            width: 100%;
            max-width: 500px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
            animation: fadeIn 0.7s ease forwards;
            margin-bottom: 28px;
        }

        .week-card h3 {
            font-size: 16px;
            font-weight: 700;
            color: #374151;
            margin-bottom: 20px;
            text-align: center;
        }

        .week-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .day-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .day-name {
            font-size: 11px;
            font-weight: 600;
            color: #9ca3af;
            text-transform: uppercase;
        }

        .day-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            border: 2px solid #f1f5f9;
            background: #f9fafb;
            transition: all 0.3s ease;
        }

        .day-circle.completed {
            background: linear-gradient(135deg, #f97316, #ef4444);
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(249,115,22,0.35);
        }

        .day-circle.today {
            border-color: #22c55e;
            background: rgba(34,197,94,0.08);
        }

        .day-circle.today.completed {
            background: linear-gradient(135deg, #f97316, #ef4444);
            border-color: #22c55e;
            box-shadow: 0 4px 16px rgba(249,115,22,0.5);
        }

        /* ── MOTIVATIONAL ── */
        .motivation-card {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            border-radius: 20px;
            padding: 30px 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.8s ease forwards;
        }

        .motivation-card::before {
            content: '';
            position: absolute;
            width: 300px; height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(249,115,22,0.15) 0%, transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        .motivation-card p {
            font-size: 16px;
            color: rgba(255,255,255,0.8);
            line-height: 1.7;
            position: relative;
            font-style: italic;
        }

        .motivation-card .quote-emoji {
            font-size: 32px;
            display: block;
            margin-bottom: 12px;
        }

        /* ── NOT LOGGED IN ── */
        .not-logged-in {
            text-align: center;
            padding: 80px 40px;
            animation: fadeIn 0.5s ease;
        }

        .not-logged-in h2 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 14px;
            color: #111827;
        }

        .not-logged-in p {
            color: #6b7280;
            margin-bottom: 32px;
            font-size: 16px;
        }

        .hero-btn {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            padding: 13px 34px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 8px 24px rgba(34,197,94,0.38);
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .hero-btn:hover { transform: translateY(-3px); box-shadow: 0 14px 36px rgba(34,197,94,0.48); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── MOBILE ── */
        @media (max-width: 768px) {
            .home-nav { padding: 14px 20px; position: relative; }
            .logo { font-size: 20px; }
            .hamburger { display: flex; }
            .nav-buttons { display: none; }
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 62px; left: 0; right: 0;
                background: rgba(255,255,255,0.98);
                backdrop-filter: blur(16px);
                padding: 16px; gap: 6px;
                border-bottom: 1px solid #f1f5f9;
                z-index: 999;
                box-shadow: 0 12px 32px rgba(0,0,0,0.1);
            }
            .nav-links.open { display: flex; }
            .nav-links a { padding: 10px 14px; width: 100%; border-radius: 10px; }

            .streak-page { padding: 50px 20px; }
            .streak-page h2 { font-size: 28px; }
            .streak-card { padding: 36px 28px; }
            .streak-count { font-size: 56px; }
            .streak-flame { font-size: 56px; }
            .stats-row { grid-template-columns: 1fr 1fr 1fr; }
            .week-card { padding: 24px 20px; }
            .day-circle { width: 34px; height: 34px; font-size: 14px; }
            .motivation-card { padding: 24px 24px; }
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="home-nav">
    <h1 class="logo">Solo Study</h1>
    <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
    </button>
    <div class="nav-right">
        <ul class="nav-links" id="navLinks">
            <li><a href__="../index.html">Home</a></li>
            <li><a href__="index.html" class="active">Streak</a></li>
            <li><a href__="../lessons/index.html">Lessons</a></li>
            <li><a href__="../contact/index.html">Contact</a></li>
            <li><a href__="../profile/index.html" id="profileLink" style="display:none">Profile</a></li>
        </ul>
        <div class="nav-buttons" id="navButtons">
            <button class="nav-btn" id="getStartedBtn">Get Started</button>
            <button class="nav-sign-in" id="signInBtn" onclick="window.location.href__='../login/index.html'">Sign in</button>
            <button class="nav-btn logout-btn" id="logoutBtn" style="display:none">Logout</button>
        </div>
    </div>
</nav>

<!-- STREAK CONTENT -->
<div class="streak-page" id="streakContent"></div>

<script>
    const loggedIn = localStorage.getItem("loggedIn") === "true";
    const user = JSON.parse(localStorage.getItem("loggedInUser") || "null");
    const container = document.getElementById("streakContent");

    if (!loggedIn || !user) {
        container.innerHTML = `
            <div class="not-logged-in">
                <h2>You're not logged in 👋</h2>
                <p>Sign in to track your daily streak.</p>
                <a href__="../login/index.html" class="hero-btn">Sign In</a>
            </div>`;
    } else {

        // ── READ STREAK DATA ──
        let streakData = JSON.parse(localStorage.getItem("streakData") || '{"count":0,"lastDate":null,"activeDays":[]}');
        let streak = streakData.count || 0;
        let lastDate = streakData.lastDate || null;
        let activeDays = streakData.activeDays || [];

        const today = new Date().toISOString().split("T")[0];

        // ── AUTO-UPDATE STREAK ON VISIT ──
        if (lastDate !== today) {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = yesterday.toISOString().split("T")[0];

            if (lastDate === yesterdayStr) {
                // Continued streak
                streak++;
            } else if (lastDate !== today) {
                // Broken streak — reset
                streak = 1;
            }

            if (!activeDays.includes(today)) activeDays.push(today);

            streakData = { count: streak, lastDate: today, activeDays };
            localStorage.setItem("streakData", JSON.stringify(streakData));
        }

        // ── XP & LEVEL ──
        const xp = parseInt(localStorage.getItem("xp") || "0");
        const level = Math.floor(xp / 100) + 1;

        // ── BEST STREAK (track it) ──
        let bestStreak = parseInt(localStorage.getItem("bestStreak") || "0");
        if (streak > bestStreak) {
            bestStreak = streak;
            localStorage.setItem("bestStreak", bestStreak);
        }

        // ── STATUS MESSAGE ──
        let statusHTML = '';
        if (streak >= 7) {
            statusHTML = `<div class="streak-status active">🔥 You're on fire! Keep it up!</div>`;
        } else if (streak >= 3) {
            statusHTML = `<div class="streak-status active">✅ Great momentum! Don't stop now!</div>`;
        } else if (streak === 1) {
            statusHTML = `<div class="streak-status warning">⚡ Day 1 — Come back tomorrow to build your streak!</div>`;
        } else {
            statusHTML = `<div class="streak-status inactive">💪 Start studying to begin your streak!</div>`;
        }

        // ── MOTIVATIONAL QUOTES ──
        const quotes = [
            "Every expert was once a beginner. Every pro was once an amateur.",
            "Small daily improvements lead to stunning long-term results.",
            "You don't have to be great to start, but you have to start to be great.",
            "Consistency is what transforms average into excellence.",
            "The secret to getting ahead is getting started."
        ];
        const quote = quotes[new Date().getDay() % quotes.length];

        // ── LAST 7 DAYS CALENDAR ──
        const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
        let weekHTML = '';
        for (let i = 6; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            const dateStr = d.toISOString().split("T")[0];
            const dayName = days[d.getDay()];
            const isToday = dateStr === today;
            const isActive = activeDays.includes(dateStr);

            let circleClass = "day-circle";
            if (isActive) circleClass += " completed";
            if (isToday) circleClass += " today";

            weekHTML += `
                <div class="day-cell">
                    <span class="day-name">${dayName}</span>
                    <div class="${circleClass}">${isActive ? "🔥" : ""}</div>
                </div>`;
        }

        // ── RENDER ──
        container.innerHTML = `
            <h2>My Streak</h2>
            <p class="subtitle">Study every day to keep your streak alive!</p>

            <div class="streak-card">
                <span class="streak-flame">🔥</span>
                <div class="streak-count"><span>${streak}</span></div>
                <div class="streak-label">${streak === 1 ? "Day Streak" : "Day Streak"}</div>
                <div class="streak-sublabel">Last active: ${lastDate || "Never"}</div>
                ${statusHTML}
            </div>

            <div class="stats-row">
                <div class="stat-box">
                    <div class="stat-icon">🏆</div>
                    <div class="stat-value">${bestStreak}</div>
                    <div class="stat-label">Best Streak</div>
                </div>
                <div class="stat-box">
                    <div class="stat-icon">⭐</div>
                    <div class="stat-value">${xp}</div>
                    <div class="stat-label">Total XP</div>
                </div>
                <div class="stat-box">
                    <div class="stat-icon">🎯</div>
                    <div class="stat-value">Lv ${level}</div>
                    <div class="stat-label">Level</div>
                </div>
            </div>

            <div class="week-card">
                <h3>📅 This Week</h3>
                <div class="week-grid">${weekHTML}</div>
            </div>

            <div class="motivation-card">
                <span class="quote-emoji">💬</span>
                <p>"${quote}"</p>
            </div>`;
    }

    // ── NAVBAR ──
    const logoutBtn = document.getElementById("logoutBtn");
    const getStartedBtn = document.getElementById("getStartedBtn");
    const signInBtn = document.getElementById("signInBtn");
    const profileLink = document.getElementById("profileLink");

    if (loggedIn) {
        if (logoutBtn)     logoutBtn.style.display     = "inline-block";
        if (getStartedBtn) getStartedBtn.style.display  = "none";
        if (signInBtn)     signInBtn.style.display      = "none";
        if (profileLink)   profileLink.style.display    = "inline";
    }

    logoutBtn?.addEventListener("click", () => {
        localStorage.removeItem("loggedIn");
        localStorage.removeItem("loggedInUser");
        window.location.href = "../index.html";
    });

    document.getElementById("hamburger")?.addEventListener("click", () => {
        document.getElementById("navLinks").classList.toggle("open");
    });
</script>

</body>
</html>
