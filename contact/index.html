<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Contact Us | Solo Study</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- NAVBAR -->
    <nav class="home-nav">
        <div class="logo">Solo Study</div>
        <ul class="nav-links">
            <li><a href="/index.html">Home</a></li>
            <li><a href="/solo-study/lessons/index.html">Lessons</a></li>
            <li><a href="/solo-study/streak/index.html">Streak</a></li>
            <li><a href="index.html">Contact</a></li>
        </ul>
    </nav>

    <!-- HERO -->
    <section class="contact-hero">
        <h1>📬 Contact Us</h1>
        <p>Have a question or feedback? We'd love to hear from you!</p>
    </section>

    <!-- CONTACT FORM -->
    <section class="contact-section">
        <div class="contact-card">
            <form>
                <div class="input-group">
                    <label>Your Name</label>
                    <input type="text" placeholder="Enter your name" />
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="Enter your email" />
                </div>

                <div class="input-group">
                    <label>Message</label>
                    <textarea rows="5" placeholder="Write your message here..."></textarea>
                </div>

                <button type="submit" class="nav-btn">Send Message 🚀</button>
            </form>
        </div>
    </section>

    <script src="code.js"></script>
</body>
</html>
